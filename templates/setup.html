<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configurar Admin</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/main.css') }}"
    />
  </head>
  <body>
    <header class="hero" style="padding: 2rem;">
      <h1>Configuração Inicial</h1>
    </header>

    <main class="container">
      <section class="card">
        <div class="text-center">
          <h2>Criar Conta de Administrador</h2>
          <p>Defina um usuário e senha para acessar os dados restritos.</p>
        </div>
        <form action="/setup" method="post">
          <div class="form-group">
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" class="form-control" required />
          </div>
          <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" class="form-control" required />
          </div>
          <div class="text-center">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Configurar</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
